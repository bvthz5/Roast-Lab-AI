name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v7
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Enable corepack & Install pnpm
      run: corepack enable pnpm
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Format Check
      run: pnpm run format:check
      
    - name: Run Tests
      run: pnpm test
        
    - name: Build Vite App
      run: pnpm run build
